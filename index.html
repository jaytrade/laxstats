<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LAX Stats</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root { --bg:#0a0e1a; --surface:#121829; --card:#1a2235; --border:#2a3550; --accent:#00e5ff; --accent2:#ff4757; --accent3:#2ed573; --gold:#ffd32a; --text:#e8edf5; --muted:#6b7a99; --radius:14px; --btn-radius:12px; }
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100dvh; padding-bottom:110px; overflow-x:hidden; }
  .header-stripe { background:linear-gradient(135deg,#0d1f3c 0%,#0a1628 100%); border-bottom:2px solid var(--accent); padding:16px 16px 12px; position:sticky; top:0; z-index:100; box-shadow:0 4px 24px rgba(0,229,255,.15); }
  .app-title { font-family:'Bebas Neue',sans-serif; font-size:13px; letter-spacing:3px; color:var(--accent); opacity:.7; }
  .game-info-display { display:flex; align-items:baseline; gap:10px; flex-wrap:wrap; margin-top:2px; }
  .player-name { font-family:'Bebas Neue',sans-serif; font-size:32px; color:var(--text); line-height:1; }
  .num-badge { background:var(--accent); color:var(--bg); font-family:'Bebas Neue',sans-serif; font-size:22px; padding:2px 10px; border-radius:6px; line-height:1.4; }
  .game-meta { display:flex; gap:8px; flex-wrap:wrap; margin-top:6px; }
  .meta-pill { font-size:13px; font-weight:600; color:var(--muted); background:var(--card); border:1px solid var(--border); border-radius:20px; padding:3px 12px; }
  .meta-pill span { color:var(--text); }
  .setup-screen { padding:28px 18px; }
  .setup-title { font-family:'Bebas Neue',sans-serif; font-size:38px; letter-spacing:1px; color:var(--accent); margin-bottom:6px; }
  .setup-sub { font-size:15px; color:var(--muted); margin-bottom:28px; }
  .form-group { margin-bottom:18px; }
  label { display:block; font-size:13px; font-weight:700; letter-spacing:1.5px; color:var(--muted); text-transform:uppercase; margin-bottom:7px; }
  input { width:100%; background:var(--card); border:1.5px solid var(--border); border-radius:var(--btn-radius); color:var(--text); font-family:'DM Sans',sans-serif; font-size:18px; font-weight:500; padding:15px 16px; outline:none; transition:border-color .2s,box-shadow .2s; }
  input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(0,229,255,.12); }
  input:disabled { opacity:.6; cursor:not-allowed; }
  .locked-note { font-size:12px; color:var(--muted); margin-top:5px; }
  .confirm-btn { width:100%; margin-top:10px; background:var(--accent); color:var(--bg); font-family:'Bebas Neue',sans-serif; font-size:24px; letter-spacing:2px; border:none; border-radius:var(--btn-radius); padding:18px; cursor:pointer; box-shadow:0 6px 24px rgba(0,229,255,.3); }
  .confirm-btn:active { transform:scale(.97); }
  .tracker-screen { padding:16px 14px 0; }
  .score-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:16px; }
  .score-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:12px 8px 10px; text-align:center; }
  .score-card.goals { border-color:var(--accent3); }
  .score-card.shots { border-color:var(--accent); }
  .score-card.assists { border-color:var(--gold); }
  .sc-label { font-size:11px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); }
  .sc-num { font-family:'Bebas Neue',sans-serif; font-size:42px; line-height:1; margin-top:2px; }
  .score-card.goals .sc-num { color:var(--accent3); }
  .score-card.shots .sc-num { color:var(--accent); }
  .score-card.assists .sc-num { color:var(--gold); }
  .section-label { font-size:12px; font-weight:700; letter-spacing:2px; color:var(--muted); text-transform:uppercase; margin:12px 0 9px; }
  .stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:9px; margin-bottom:12px; }
  .stat-btn { background:var(--card); border:1.5px solid var(--border); border-radius:var(--btn-radius); color:var(--text); font-family:'DM Sans',sans-serif; cursor:pointer; padding:16px 14px; display:flex; align-items:center; justify-content:space-between; position:relative; overflow:hidden; min-height:74px; }
  .stat-btn:active { transform:scale(.95); }
  .btn-left { display:flex; flex-direction:column; align-items:flex-start; gap:3px; }
  .btn-icon { font-size:22px; line-height:1; }
  .btn-name { font-size:14px; font-weight:600; color:var(--text); text-align:left; line-height:1.2; }
  .btn-count { font-family:'Bebas Neue',sans-serif; font-size:38px; line-height:1; min-width:40px; text-align:right; }
  .stat-btn.positive { border-color:rgba(46,213,115,.3); }
  .stat-btn.positive .btn-count { color:var(--accent3); }
  .stat-btn.positive:active { background:rgba(46,213,115,.08); border-color:var(--accent3); }
  .stat-btn.neutral { border-color:rgba(0,229,255,.2); }
  .stat-btn.neutral .btn-count { color:var(--accent); }
  .stat-btn.neutral:active { background:rgba(0,229,255,.08); border-color:var(--accent); }
  .stat-btn.negative { border-color:rgba(255,71,87,.3); }
  .stat-btn.negative .btn-count { color:var(--accent2); }
  .stat-btn.negative:active { background:rgba(255,71,87,.08); border-color:var(--accent2); }
  .stat-btn.warning { border-color:rgba(255,211,42,.3); }
  .stat-btn.warning .btn-count { color:var(--gold); }
  .stat-btn.warning:active { background:rgba(255,211,42,.08); border-color:var(--gold); }
  .stat-btn::after { content:''; position:absolute; inset:0; background:white; opacity:0; border-radius:inherit; pointer-events:none; transition:opacity .3s; }
  .stat-btn.flash::after { opacity:.06; }
  .stat-btn.full { grid-column:span 2; padding:18px 20px; min-height:84px; background:linear-gradient(135deg,rgba(46,213,115,.12) 0%,rgba(46,213,115,.04) 100%); border-color:var(--accent3); box-shadow:0 4px 20px rgba(46,213,115,.15); }
  .stat-btn.full .btn-name { font-size:18px; }
  .stat-btn.full .btn-count { font-size:52px; }
  .action-bar { position:fixed; bottom:0; left:0; right:0; background:rgba(10,14,26,.95); backdrop-filter:blur(12px); border-top:1px solid var(--border); padding:12px 14px calc(12px + env(safe-area-inset-bottom)); display:flex; gap:10px; z-index:100; }
  .action-btn { flex:1; border:none; border-radius:var(--btn-radius); font-family:'Bebas Neue',sans-serif; font-size:19px; letter-spacing:1.5px; padding:16px 8px; cursor:pointer; transition:transform .1s; }
  .action-btn:active { transform:scale(.96); }
  .action-btn.reset { background:var(--card); color:var(--accent2); border:1.5px solid rgba(255,71,87,.3); flex:0 0 auto; width:90px; }
  .action-btn.save { background:var(--accent); color:var(--bg); box-shadow:0 4px 20px rgba(0,229,255,.3); }
  .action-btn.edit-setup { background:var(--card); color:var(--muted); border:1.5px solid var(--border); flex:0 0 auto; width:80px; font-size:15px; }
  .modal-overlay { position:fixed; inset:0; background:rgba(5,8,18,.88); backdrop-filter:blur(8px); z-index:200; display:flex; align-items:flex-end; padding:16px; }
  .modal-overlay.hidden { display:none !important; }
  .modal { background:var(--surface); border:1px solid var(--border); border-radius:20px; width:100%; padding:26px 22px; box-shadow:0 -8px 48px rgba(0,0,0,.5); }
  .modal h2 { font-family:'Bebas Neue',sans-serif; font-size:30px; letter-spacing:1px; color:var(--accent); margin-bottom:4px; }
  .modal-sub { font-size:14px; color:var(--muted); margin-bottom:18px; }
  .stats-summary { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:20px; }
  .summary-row { display:flex; justify-content:space-between; align-items:center; background:var(--card); border-radius:10px; padding:11px 14px; }
  .s-label { font-size:13px; color:var(--muted); font-weight:500; }
  .s-val { font-family:'Bebas Neue',sans-serif; font-size:26px; color:var(--text); }
  .modal-actions { display:flex; gap:10px; }
  .modal-btn { flex:1; border:none; border-radius:var(--btn-radius); font-family:'Bebas Neue',sans-serif; font-size:19px; letter-spacing:1px; padding:16px; cursor:pointer; }
  .modal-btn.close-btn { background:var(--card); color:var(--muted); border:1.5px solid var(--border); }
  .modal-btn.save-btn { background:var(--accent3); color:var(--bg); box-shadow:0 4px 16px rgba(46,213,115,.3); }
  .reset-modal .modal h2 { color:var(--accent2); }
  .modal-btn.confirm-reset { background:var(--accent2); color:white; }
  .ts { font-size:12px; color:var(--muted); margin-top:4px; }
  .hidden { display:none !important; }
</style>
</head>
<body>

<div id="setupScreen" class="setup-screen">
  <div class="setup-title">LAX STATS</div>
  <div class="setup-sub">Enter game details to get started</div>
  <div class="form-group">
    <label>Player Name</label>
    <input type="text" id="playerName" value="Ben Brausewetter" disabled>
    <div class="locked-note">🔒 Locked</div>
  </div>
  <div class="form-group">
    <label>Jersey Number</label>
    <input type="text" id="playerNum" value="24" disabled>
    <div class="locked-note">🔒 Locked</div>
  </div>
  <div class="form-group">
    <label>Tournament</label>
    <input type="text" id="tournament" placeholder="e.g. Spring Invitational">
  </div>
  <div class="form-group">
    <label>Game Number</label>
    <input type="number" id="gameNum" placeholder="e.g. 7" inputmode="numeric">
  </div>
  <div class="form-group">
    <label>Opponent</label>
    <input type="text" id="opponent" placeholder="e.g. Freehold Boro">
  </div>
  <button class="confirm-btn" onclick="confirmSetup()">CONFIRM &amp; START TRACKING</button>
</div>

<div id="trackerScreen" class="hidden">
  <div class="header-stripe">
    <div class="app-title">LAX STATS TRACKER</div>
    <div class="game-info-display">
      <div class="num-badge">#24</div>
      <div class="player-name">Ben Brausewetter</div>
    </div>
    <div class="game-meta">
      <div class="meta-pill"><span id="displayTournament">Tournament</span></div>
      <div class="meta-pill">Game <span id="displayGame">—</span></div>
      <div class="meta-pill">vs <span id="displayOpp">Opponent</span></div>
    </div>
  </div>

  <div class="tracker-screen">
    <div class="score-row">
      <div class="score-card goals">
        <div class="sc-label">Goals</div>
        <div class="sc-num" id="scoreGoals">0</div>
      </div>
      <div class="score-card shots">
        <div class="sc-label">Shots</div>
        <div class="sc-num" id="scoreShots">0</div>
      </div>
      <div class="score-card assists">
        <div class="sc-label">Assists</div>
        <div class="sc-num" id="scoreAssists">0</div>
      </div>
    </div>

    <div class="section-label">⚡ Offense</div>
    <div class="stat-grid">
      <button class="stat-btn full positive" onclick="increment('goal')" id="btn-goal">
        <div class="btn-left"><div class="btn-icon">🥍</div><div class="btn-name">Goal Made</div></div>
        <div class="btn-count" id="count-goal">0</div>
      </button>
      <button class="stat-btn neutral" onclick="increment('shotOn')" id="btn-shotOn">
        <div class="btn-left"><div class="btn-icon">🎯</div><div class="btn-name">Shot On Goal</div></div>
        <div class="btn-count" id="count-shotOn">0</div>
      </button>
      <button class="stat-btn negative" onclick="increment('shotOff')" id="btn-shotOff">
        <div class="btn-left"><div class="btn-icon">↗️</div><div class="btn-name">Shot Off Goal</div></div>
        <div class="btn-count" id="count-shotOff">0</div>
      </button>
      <button class="stat-btn positive" onclick="increment('assist')" id="btn-assist">
        <div class="btn-left"><div class="btn-icon">🤝</div><div class="btn-name">Assist</div></div>
        <div class="btn-count" id="count-assist">0</div>
      </button>
    </div>

    <div class="section-label">🏃 Possession</div>
    <div class="stat-grid">
      <button class="stat-btn positive" onclick="increment('groundball')" id="btn-groundball">
        <div class="btn-left"><div class="btn-icon">⚽</div><div class="btn-name">Ground Ball</div></div>
        <div class="btn-count" id="count-groundball">0</div>
      </button>
      <button class="stat-btn positive" onclick="increment('causedTO')" id="btn-causedTO">
        <div class="btn-left"><div class="btn-icon">💥</div><div class="btn-name">Caused TO</div></div>
        <div class="btn-count" id="count-causedTO">0</div>
      </button>
      <button class="stat-btn negative" onclick="increment('turnover')" id="btn-turnover">
        <div class="btn-left"><div class="btn-icon">🔄</div><div class="btn-name">Turnover</div></div>
        <div class="btn-count" id="count-turnover">0</div>
      </button>
      <button class="stat-btn neutral" onclick="increment('clear')" id="btn-clear">
        <div class="btn-left"><div class="btn-icon">🚀</div><div class="btn-name">Clear</div></div>
        <div class="btn-count" id="count-clear">0</div>
      </button>
    </div>

    <div class="section-label">⚠️ Discipline</div>
    <div class="stat-grid">
      <button class="stat-btn warning" onclick="increment('foul')" id="btn-foul">
        <div class="btn-left"><div class="btn-icon">🟨</div><div class="btn-name">Foul / Penalty</div></div>
        <div class="btn-count" id="count-foul">0</div>
      </button>
      <button class="stat-btn negative" onclick="increment('offside')" id="btn-offside">
        <div class="btn-left"><div class="btn-icon">🚩</div><div class="btn-name">Offside</div></div>
        <div class="btn-count" id="count-offside">0</div>
      </button>
    </div>

    <div style="height:24px;"></div>
  </div>

  <div class="action-bar">
    <button class="action-btn reset" onclick="showResetConfirm()">RESET</button>
    <button class="action-btn edit-setup" onclick="editSetup()">EDIT</button>
    <button class="action-btn save" onclick="showSummary()">SAVE &amp; EXPORT →</button>
  </div>
</div>

<div class="modal-overlay hidden" id="summaryModal">
  <div class="modal">
    <h2>GAME SUMMARY</h2>
    <div class="modal-sub" id="summaryMeta"></div>
    <div class="stats-summary" id="statsSummaryGrid"></div>
    <div class="ts" id="summaryTimestamp"></div>
    <br>
    <div class="modal-actions">
      <button class="modal-btn close-btn" onclick="closeSummary()">CLOSE</button>
      <button class="modal-btn save-btn" id="saveToSheetsBtn" onclick="saveToSheets()">SAVE TO SHEETS</button>
    </div>
  </div>
</div>

<div class="modal-overlay hidden reset-modal" id="resetModal">
  <div class="modal">
    <h2>RESET STATS?</h2>
    <div class="modal-sub">This will clear all current stat counts. Game info is kept.</div>
    <br>
    <div class="modal-actions">
      <button class="modal-btn close-btn" onclick="closeReset()">CANCEL</button>
      <button class="modal-btn confirm-reset" onclick="doReset()">RESET ALL</button>
    </div>
  </div>
</div>

<script>
  const stats = { goal:0, shotOn:0, shotOff:0, assist:0, groundball:0, causedTO:0, turnover:0, clear:0, foul:0, offside:0 };
  let gameInfo = { gameNum:'', tournament:'', opponent:'' };

  function confirmSetup() {
    const o = document.getElementById('opponent').value.trim();
    const t = document.getElementById('tournament').value.trim();
    const g = document.getElementById('gameNum').value.trim();
    if (!o) { document.getElementById('opponent').focus(); return; }
    gameInfo = { gameNum:g||'—', tournament:t||'—', opponent:o };
    document.getElementById('displayTournament').textContent = t||'—';
    document.getElementById('displayGame').textContent = g||'—';
    document.getElementById('displayOpp').textContent = o;
    document.getElementById('setupScreen').classList.add('hidden');
    document.getElementById('trackerScreen').classList.remove('hidden');
  }

  function editSetup() {
    document.getElementById('trackerScreen').classList.add('hidden');
    document.getElementById('setupScreen').classList.remove('hidden');
  }

  function increment(key) {
    stats[key]++;
    document.getElementById('count-' + key).textContent = stats[key];
    const btn = document.getElementById('btn-' + key);
    btn.classList.remove('flash');
    void btn.offsetWidth;
    btn.classList.add('flash');
    setTimeout(() => btn.classList.remove('flash'), 300);
    document.getElementById('scoreGoals').textContent = stats.goal;
    document.getElementById('scoreShots').textContent = stats.goal + stats.shotOn + stats.shotOff;
    document.getElementById('scoreAssists').textContent = stats.assist;
  }

  function showSummary() {
    const ts = new Date().toLocaleString();
    document.getElementById('summaryMeta').textContent = 'Ben Brausewetter #24 \u2022 ' + gameInfo.tournament + ' \u2022 Game ' + gameInfo.gameNum + ' vs ' + gameInfo.opponent;
    document.getElementById('summaryTimestamp').textContent = 'Saved: ' + ts;
    const labels = { goal:'Goals', shotOn:'Shots On Goal', shotOff:'Shots Off Goal', assist:'Assists', groundball:'Ground Balls', causedTO:'Caused TOs', turnover:'Turnovers', clear:'Clears', foul:'Fouls', offside:'Offsides' };
    const grid = document.getElementById('statsSummaryGrid');
    grid.innerHTML = '';
    for (const [key, label] of Object.entries(labels)) {
      grid.innerHTML += '<div class="summary-row"><span class="s-label">' + label + '</span><span class="s-val">' + stats[key] + '</span></div>';
    }
    document.getElementById('summaryModal').classList.remove('hidden');
  }

  function closeSummary() { document.getElementById('summaryModal').classList.add('hidden'); }

  async function saveToSheets() {
    const SHEET_URL = 'https://script.google.com/macros/s/AKfycbwkQN85lcJmFSHnRsbuArrecWrH4p2xklneHDtunngBiUzsTu-FwTKpgx16IZmj4zqhRg/exec';
    const btn = document.getElementById('saveToSheetsBtn');
    btn.textContent = 'SAVING...';
    btn.disabled = true;
    const payload = {
      gameNumber: gameInfo.gameNum,
      tournament: gameInfo.tournament,
      opponent: gameInfo.opponent,
      date: new Date().toLocaleDateString(),
      goals: stats.goal,
      shotsOnGoal: stats.shotOn,
      shotsOffGoal: stats.shotOff,
      assists: stats.assist,
      clears: stats.clear,
      offsides: stats.offside,
      groundBalls: stats.groundball,
      causedTurnovers: stats.causedTO,
      turnovers: stats.turnover,
      foulPenalties: stats.foul
    };
    try {
      await fetch(SHEET_URL, {
        method:'POST',
        mode:'no-cors',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify(payload)
      });
      btn.textContent = '\u2713 SAVED TO SHEETS';
      btn.style.background = 'var(--accent3)';
      setTimeout(() => { btn.textContent = 'SAVE TO SHEETS'; btn.style.background = ''; btn.disabled = false; }, 3000);
    } catch(err) {
      btn.textContent = 'ERROR \u2014 TRY AGAIN';
      btn.style.background = 'var(--accent2)';
      btn.disabled = false;
    }
  }

  function showResetConfirm() { document.getElementById('resetModal').classList.remove('hidden'); }
  function closeReset() { document.getElementById('resetModal').classList.add('hidden'); }
  function doReset() {
    for (const key of Object.keys(stats)) stats[key] = 0;
    for (const key of Object.keys(stats)) document.getElementById('count-' + key).textContent = '0';
    document.getElementById('scoreGoals').textContent = '0';
    document.getElementById('scoreShots').textContent = '0';
    document.getElementById('scoreAssists').textContent = '0';
    closeReset();
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !document.getElementById('setupScreen').classList.contains('hidden')) confirmSetup();
  });
</script>
</body>
</html>
