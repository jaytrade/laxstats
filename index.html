<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LAX Stats</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #121829;
    --card: #1a2235;
    --border: #2a3550;
    --accent: #00e5ff;
    --accent2: #ff4757;
    --accent3: #2ed573;
    --gold: #ffd32a;
    --text: #e8edf5;
    --muted: #6b7a99;
    --radius: 14px;
    --btn-radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100dvh; padding-bottom: 100px; overflow-x: hidden; }
  .header-stripe { background: linear-gradient(135deg, #0d1f3c 0%, #0a1628 100%); border-bottom: 2px solid var(--accent); padding: 14px 16px 10px; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 24px rgba(0,229,255,.15); }
  .header-stripe .app-title { font-family: 'Bebas Neue', sans-serif; font-size: 11px; letter-spacing: 3px; color: var(--accent); opacity: .7; }
  .game-info-display { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; margin-top: 2px; }
  .game-info-display .player-name { font-family: 'Bebas Neue', sans-serif; font-size: 26px; color: var(--text); line-height: 1; }
  .game-info-display .num-badge { background: var(--accent); color: var(--bg); font-family: 'Bebas Neue', sans-serif; font-size: 18px; padding: 1px 8px; border-radius: 6px; line-height: 1.4; }
  .game-meta { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
  .meta-pill { font-size: 11px; font-weight: 600; letter-spacing: .5px; color: var(--muted); background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 2px 10px; }
  .meta-pill span { color: var(--text); }
  .setup-screen { padding: 24px 16px; }
  .setup-title { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 1px; color: var(--accent); margin-bottom: 6px; }
  .setup-sub { font-size: 13px; color: var(--muted); margin-bottom: 24px; }
  .form-group { margin-bottom: 16px; }
  label { display: block; font-size: 11px; font-weight: 700; letter-spacing: 1.5px; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; }
  input { width: 100%; background: var(--card); border: 1.5px solid var(--border); border-radius: var(--btn-radius); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 500; padding: 13px 16px; outline: none; transition: border-color .2s, box-shadow .2s; }
  input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,229,255,.12); }
  .confirm-btn { width: 100%; margin-top: 8px; background: var(--accent); color: var(--bg); font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 2px; border: none; border-radius: var(--btn-radius); padding: 16px; cursor: pointer; transition: transform .1s, box-shadow .2s; box-shadow: 0 6px 24px rgba(0,229,255,.3); }
  .confirm-btn:active { transform: scale(.97); }
  .tracker-screen { padding: 14px 14px 0; }
  .score-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 14px; }
  .score-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 8px 8px; text-align: center; }
  .score-card.goals { border-color: var(--accent3); }
  .score-card.shots { border-color: var(--accent); }
  .score-card.fouls { border-color: var(--accent2); }
  .score-card .sc-label { font-size: 9px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); }
  .score-card .sc-num { font-family: 'Bebas Neue', sans-serif; font-size: 36px; line-height: 1; margin-top: 2px; }
  .score-card.goals .sc-num { color: var(--accent3); }
  .score-card.shots .sc-num { color: var(--accent); }
  .score-card.fouls .sc-num { color: var(--accent2); }
  .section-label { font-size: 10px; font-weight: 700; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin: 10px 0 8px; }
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
  .stat-btn { background: var(--card); border: 1.5px solid var(--border); border-radius: var(--btn-radius); color: var(--text); font-family: 'DM Sans', sans-serif; cursor: pointer; padding: 14px 12px; display: flex; align-items: center; justify-content: space-between; transition: transform .08s, background .15s, border-color .15s; position: relative; overflow: hidden; min-height: 64px; }
  .stat-btn:active { transform: scale(.95); }
  .stat-btn .btn-left { display: flex; flex-direction: column; align-items: flex-start; gap: 2px; }
  .stat-btn .btn-icon { font-size: 18px; line-height: 1; }
  .stat-btn .btn-name { font-size: 12px; font-weight: 600; color: var(--text); text-align: left; line-height: 1.2; }
  .stat-btn .btn-count { font-family: 'Bebas Neue', sans-serif; font-size: 32px; line-height: 1; min-width: 36px; text-align: right; }
  .stat-btn.positive { border-color: rgba(46,213,115,.3); }
  .stat-btn.positive .btn-count { color: var(--accent3); }
  .stat-btn.positive:active { background: rgba(46,213,115,.08); border-color: var(--accent3); }
  .stat-btn.neutral { border-color: rgba(0,229,255,.2); }
  .stat-btn.neutral .btn-count { color: var(--accent); }
  .stat-btn.neutral:active { background: rgba(0,229,255,.08); border-color: var(--accent); }
  .stat-btn.negative { border-color: rgba(255,71,87,.3); }
  .stat-btn.negative .btn-count { color: var(--accent2); }
  .stat-btn.negative:active { background: rgba(255,71,87,.08); border-color: var(--accent2); }
  .stat-btn.warning { border-color: rgba(255,211,42,.3); }
  .stat-btn.warning .btn-count { color: var(--gold); }
  .stat-btn.warning:active { background: rgba(255,211,42,.08); border-color: var(--gold); }
  .stat-btn::after { content: ''; position: absolute; inset: 0; background: white; opacity: 0; border-radius: inherit; pointer-events: none; transition: opacity .3s; }
  .stat-btn.flash::after { opacity: .06; }
  .stat-btn.full { grid-column: span 2; padding: 16px 18px; min-height: 72px; background: linear-gradient(135deg, rgba(46,213,115,.12) 0%, rgba(46,213,115,.04) 100%); border-color: var(--accent3); box-shadow: 0 4px 20px rgba(46,213,115,.15); }
  .stat-btn.full .btn-name { font-size: 15px; }
  .stat-btn.full .btn-count { font-size: 44px; }
  .action-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(10,14,26,.95); backdrop-filter: blur(12px); border-top: 1px solid var(--border); padding: 10px 14px calc(10px + env(safe-area-inset-bottom)); display: flex; gap: 10px; z-index: 100; }
  .action-btn { flex: 1; border: none; border-radius: var(--btn-radius); font-family: 'Bebas Neue', sans-serif; font-size: 17px; letter-spacing: 1.5px; padding: 14px 8px; cursor: pointer; transition: transform .1s; }
  .action-btn:active { transform: scale(.96); }
  .action-btn.reset { background: var(--card); color: var(--accent2); border: 1.5px solid rgba(255,71,87,.3); flex: 0 0 auto; width: 80px; }
  .action-btn.save { background: var(--accent); color: var(--bg); box-shadow: 0 4px 20px rgba(0,229,255,.3); }
  .action-btn.edit-setup { background: var(--card); color: var(--muted); border: 1.5px solid var(--border); flex: 0 0 auto; width: 72px; font-size: 13px; }
  .modal-overlay { position: fixed; inset: 0; background: rgba(5,8,18,.88); backdrop-filter: blur(8px); z-index: 200; display: flex; align-items: flex-end; padding: 16px; }
  .modal-overlay.hidden { display: none !important; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; width: 100%; padding: 24px 20px; box-shadow: 0 -8px 48px rgba(0,0,0,.5); }
  .modal h2 { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 1px; color: var(--accent); margin-bottom: 4px; }
  .modal .modal-sub { font-size: 12px; color: var(--muted); margin-bottom: 18px; }
  .stats-summary { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 20px; }
  .summary-row { display: flex; justify-content: space-between; align-items: center; background: var(--card); border-radius: 10px; padding: 10px 14px; }
  .summary-row .s-label { font-size: 12px; color: var(--muted); font-weight: 500; }
  .summary-row .s-val { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: var(--text); }
  .modal-actions { display: flex; gap: 10px; }
  .modal-btn { flex: 1; border: none; border-radius: var(--btn-radius); font-family: 'Bebas Neue', sans-serif; font-size: 17px; letter-spacing: 1px; padding: 14px; cursor: pointer; }
  .modal-btn.close-btn { background: var(--card); color: var(--muted); border: 1.5px solid var(--border); }
  .modal-btn.download-btn { background: var(--accent3); color: var(--bg); box-shadow: 0 4px 16px rgba(46,213,115,.3); }
  .reset-modal .modal h2 { color: var(--accent2); }
  .modal-btn.confirm-reset { background: var(--accent2); color: white; }
  .ts { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .hidden { display: none !important; }
</style>
</head>
<body>

<div id="setupScreen" class="setup-screen">
  <div class="setup-title">LAX STATS</div>
  <div class="setup-sub">Enter game details to get started</div>
  <div class="form-group">
    <label>Game Number</label>
    <input type="number" id="gameNum" placeholder="e.g. 7" inputmode="numeric">
  </div>
  <div class="form-group">
    <label>Opponent Team</label>
    <input type="text" id="opponent" placeholder="e.g. Freehold Boro">
  </div>
  <div class="form-group">
    <label>Player Name</label>
    <input type="text" id="playerName" placeholder="e.g. Jake Miller">
  </div>
  <div class="form-group">
    <label>Jersey Number</label>
    <input type="number" id="playerNum" placeholder="e.g. 24" inputmode="numeric">
  </div>
  <button class="confirm-btn" onclick="confirmSetup()">CONFIRM &amp; START TRACKING</button>
</div>

<div id="trackerScreen" class="hidden">
  <div class="header-stripe">
    <div class="app-title">LAX STATS TRACKER</div>
    <div class="game-info-display">
      <div class="num-badge" id="displayNum">#24</div>
      <div class="player-name" id="displayName">Player</div>
    </div>
    <div class="game-meta">
      <div class="meta-pill">Game <span id="displayGame">—</span></div>
      <div class="meta-pill">vs <span id="displayOpp">Opponent</span></div>
    </div>
  </div>

  <div class="tracker-screen">
    <div class="score-row">
      <div class="score-card goals">
        <div class="sc-label">Goals</div>
        <div class="sc-num" id="scoreGoals">0</div>
      </div>
      <div class="score-card shots">
        <div class="sc-label">Shots</div>
        <div class="sc-num" id="scoreShots">0</div>
      </div>
      <div class="score-card fouls">
        <div class="sc-label">Fouls</div>
        <div class="sc-num" id="scoreFouls">0</div>
      </div>
    </div>

    <div class="section-label">⚡ Offense</div>
    <div class="stat-grid">
      <button class="stat-btn full positive" onclick="increment('goal')" id="btn-goal">
        <div class="btn-left"><div class="btn-icon">🥍</div><div class="btn-name">Goal Made</div></div>
        <div class="btn-count" id="count-goal">0</div>
      </button>
      <button class="stat-btn neutral" onclick="increment('shot')" id="btn-shot">
        <div class="btn-left"><div class="btn-icon">🎯</div><div class="btn-name">Shot Missed</div></div>
        <div class="btn-count" id="count-shot">0</div>
      </button>
      <button class="stat-btn positive" onclick="increment('assist')" id="btn-assist">
        <div class="btn-left"><div class="btn-icon">🤝</div><div class="btn-name">Assist</div></div>
        <div class="btn-count" id="count-assist">0</div>
      </button>
    </div>

    <div class="section-label">🏃 Possession</div>
    <div class="stat-grid">
      <button class="stat-btn positive" onclick="increment('groundball')" id="btn-groundball">
        <div class="btn-left"><div class="btn-icon">⚽</div><div class="btn-name">Ground Ball</div></div>
        <div class="btn-count" id="count-groundball">0</div>
      </button>
      <button class="stat-btn positive" onclick="increment('causedTO')" id="btn-causedTO">
        <div class="btn-left"><div class="btn-icon">💥</div><div class="btn-name">Caused TO</div></div>
        <div class="btn-count" id="count-causedTO">0</div>
      </button>
      <button class="stat-btn negative" onclick="increment('turnover')" id="btn-turnover">
        <div class="btn-left"><div class="btn-icon">🔄</div><div class="btn-name">Turnover</div></div>
        <div class="btn-count" id="count-turnover">0</div>
      </button>
      <button class="stat-btn neutral" onclick="increment('clear')" id="btn-clear">
        <div class="btn-left"><div class="btn-icon">🚀</div><div class="btn-name">Clear</div></div>
        <div class="btn-count" id="count-clear">0</div>
      </button>
    </div>

    <div class="section-label">⚠️ Discipline</div>
    <div class="stat-grid">
      <button class="stat-btn warning" onclick="increment('foul')" id="btn-foul">
        <div class="btn-left"><div class="btn-icon">🟨</div><div class="btn-name">Foul / Penalty</div></div>
        <div class="btn-count" id="count-foul">0</div>
      </button>
      <button class="stat-btn negative" onclick="increment('offside')" id="btn-offside">
        <div class="btn-left"><div class="btn-icon">🚩</div><div class="btn-name">Offside</div></div>
        <div class="btn-count" id="count-offside">0</div>
      </button>
    </div>

    <div style="height:24px;"></div>
  </div>

  <div class="action-bar">
    <button class="action-btn reset" onclick="showResetConfirm()">RESET</button>
    <button class="action-btn edit-setup" onclick="editSetup()">EDIT</button>
    <button class="action-btn save" onclick="showSummary()">SAVE &amp; EXPORT →</button>
  </div>
</div>

<!-- Summary Modal -->
<div class="modal-overlay hidden" id="summaryModal">
  <div class="modal">
    <h2>GAME SUMMARY</h2>
    <div class="modal-sub" id="summaryMeta"></div>
    <div class="stats-summary" id="statsSummaryGrid"></div>
    <div class="ts" id="summaryTimestamp"></div>
    <br>
    <div class="modal-actions">
      <button class="modal-btn close-btn" onclick="closeSummary()">CLOSE</button>
      <button class="modal-btn download-btn" id="saveToSheetsBtn" onclick="saveToSheets()">SAVE TO SHEETS</button>
    </div>
  </div>
</div>

<!-- Reset Modal -->
<div class="modal-overlay hidden reset-modal" id="resetModal">
  <div class="modal">
    <h2>RESET STATS?</h2>
    <div class="modal-sub">This will clear all current stat counts. Game info is kept.</div>
    <br>
    <div class="modal-actions">
      <button class="modal-btn close-btn" onclick="closeReset()">CANCEL</button>
      <button class="modal-btn confirm-reset" onclick="doReset()">RESET ALL</button>
    </div>
  </div>
</div>

<script>
  const stats = { goal:0, shot:0, assist:0, groundball:0, causedTO:0, turnover:0, clear:0, foul:0, offside:0 };
  let gameInfo = { gameNum:'', opponent:'', playerName:'', playerNum:'' };

  function confirmSetup() {
    const g = document.getElementById('gameNum').value.trim();
    const o = document.getElementById('opponent').value.trim();
    const p = document.getElementById('playerName').value.trim();
    const n = document.getElementById('playerNum').value.trim();
    if (!p) { document.getElementById('playerName').focus(); return; }
    if (!o) { document.getElementById('opponent').focus(); return; }
    gameInfo = { gameNum: g||'—', opponent: o, playerName: p, playerNum: n||'—' };
    document.getElementById('displayName').textContent = p;
    document.getElementById('displayNum').textContent = '#' + gameInfo.playerNum;
    document.getElementById('displayGame').textContent = gameInfo.gameNum;
    document.getElementById('displayOpp').textContent = o;
    document.getElementById('setupScreen').classList.add('hidden');
    document.getElementById('trackerScreen').classList.remove('hidden');
  }

  function editSetup() {
    document.getElementById('trackerScreen').classList.add('hidden');
    document.getElementById('setupScreen').classList.remove('hidden');
  }

  function increment(key) {
    stats[key]++;
    document.getElementById('count-' + key).textContent = stats[key];
    const btn = document.getElementById('btn-' + key);
    btn.classList.remove('flash');
    void btn.offsetWidth;
    btn.classList.add('flash');
    setTimeout(() => btn.classList.remove('flash'), 300);
    document.getElementById('scoreGoals').textContent = stats.goal;
    document.getElementById('scoreShots').textContent = stats.goal + stats.shot;
    document.getElementById('scoreFouls').textContent = stats.foul + stats.offside;
  }

  function showSummary() {
    const ts = new Date().toLocaleString();
    document.getElementById('summaryMeta').textContent = gameInfo.playerName + ' #' + gameInfo.playerNum + ' \u2022 Game ' + gameInfo.gameNum + ' vs ' + gameInfo.opponent;
    document.getElementById('summaryTimestamp').textContent = 'Saved: ' + ts;
    const labels = { goal:'Goals', shot:'Shots Missed', assist:'Assists', groundball:'Ground Balls', causedTO:'Caused TOs', turnover:'Turnovers', clear:'Clears', foul:'Fouls', offside:'Offsides' };
    const grid = document.getElementById('statsSummaryGrid');
    grid.innerHTML = '';
    for (const [key, label] of Object.entries(labels)) {
      grid.innerHTML += '<div class="summary-row"><span class="s-label">' + label + '</span><span class="s-val">' + stats[key] + '</span></div>';
    }
    document.getElementById('summaryModal').classList.remove('hidden');
  }

  function closeSummary() { document.getElementById('summaryModal').classList.add('hidden'); }

  async function saveToSheets() {
    const SHEET_URL = 'https://script.google.com/macros/s/AKfycbwkQN85lcJmFSHnRsbuArrecWrH4p2xklneHDtunngBiUzsTu-FwTKpgx16IZmj4zqhRg/exec';
    const btn = document.getElementById('saveToSheetsBtn');
    btn.textContent = 'SAVING...';
    btn.disabled = true;

    const payload = {
      gameNumber: gameInfo.gameNum,
      tournament: '',
      opponent: gameInfo.opponent,
      date: new Date().toLocaleDateString(),
      goals: stats.goal,
      shotsOnGoal: stats.goal,
      shotsOffGoal: stats.shot,
      assists: stats.assist,
      clears: stats.clear,
      offsides: stats.offside,
      groundBalls: stats.groundball,
      causedTurnovers: stats.causedTO,
      turnovers: stats.turnover,
      foulPenalties: stats.foul
    };

    try {
      await fetch(SHEET_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      btn.textContent = '✓ SAVED TO SHEETS';
      btn.style.background = 'var(--accent3)';
      setTimeout(() => {
        btn.textContent = 'SAVE TO SHEETS';
        btn.style.background = '';
        btn.disabled = false;
      }, 3000);
    } catch (err) {
      btn.textContent = 'ERROR — TRY AGAIN';
      btn.style.background = 'var(--accent2)';
      btn.disabled = false;
    }
  }

  function showResetConfirm() { document.getElementById('resetModal').classList.remove('hidden'); }
  function closeReset() { document.getElementById('resetModal').classList.add('hidden'); }
  function doReset() {
    for (const key of Object.keys(stats)) stats[key] = 0;
    for (const key of Object.keys(stats)) document.getElementById('count-' + key).textContent = '0';
    document.getElementById('scoreGoals').textContent = '0';
    document.getElementById('scoreShots').textContent = '0';
    document.getElementById('scoreFouls').textContent = '0';
    closeReset();
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !document.getElementById('setupScreen').classList.contains('hidden')) confirmSetup();
  });
</script>
</body>
</html>
